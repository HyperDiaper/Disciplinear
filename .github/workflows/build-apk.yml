name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Web Dependencies
        run: |
          cd website
          npm install

      - name: Create Dummy Web Assets for Capacitor Sync
        run: |
          cd website
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Disciplinear</title></head><body>Loading...</body></html>' > out/index.html

      - name: Sync Capacitor Android
        run: |
          cd website
          echo "=== CURRENT DIRECTORY ==="
          pwd
          echo "=== DIRECTORY CONTENTS ==="
          ls -la
          echo "=== RUNNING DOCTOR ==="
          npx cap doctor || true
          echo "=== RUNNING SYNC ==="
          npx cap sync android --verbose

      - name: Build Android APK
        run: |
          cd website/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: disciplinear-app-apk
          path: website/android/app/build/outputs/apk/debug/app-debug.apk
